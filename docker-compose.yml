version: '3.5'

services:
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.5.14
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      MINIO_REGION: us-east-1
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - "etcd"
  attu:
    container_name: milvus-attu
    image: zilliz/attu:v2.5.11  
    environment:
      - MILVUS_URL=standalone:19530  
      - PORT=3000
    ports:
      - "8080:3000"
    depends_on:
      - standalone
    networks:
      - default  

  backend:
    container_name: aicis-backend
    build:
      context: .
      dockerfile: Dockerfile
    image: aicis-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 覆盖 .env 里的 127.0.0.1，指向 compose 内部的 Milvus 服务
      MILVUS_HOST: standalone
      MILVUS_PORT: "19530"
    ports:
      - "8000:8000"
    volumes:
      # 持久化会话历史（backend/agent.py 默认写入 /app/data/customer_service_history.json）
      - ${DOCKER_VOLUME_DIRECTORY:-.}/data:/app/data
    depends_on:
      standalone:
        condition: service_healthy
    networks:
      - default
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  migrate:
    container_name: aicis-migrate
    # 复用 backend 构建出来的同一个镜像，无需重复构建
    image: aicis-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MILVUS_HOST: standalone
      MILVUS_PORT: "19530"
    volumes:
      # 共享 data 目录，内含 bm25_state.json 等迁移状态文件
      - ${DOCKER_VOLUME_DIRECTORY:-.}/data:/app/data
    # 定时增量迁移 MongoDB -> Milvus，对应原来的:
    # nohup python backend/migrate_news.py --mode schedule > ~/logs/migrate_news.log 2>&1 &
    command: ["python", "backend/migrate_news.py", "--mode", "schedule"]
    # migrate 不对外提供 HTTP，禁用从 Dockerfile 继承的 HTTP healthcheck
    healthcheck:
      disable: true
    depends_on:
      standalone:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - default
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

networks:
  default:
    name: milvus